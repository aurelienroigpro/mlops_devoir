<!DOCTYPE html>

<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Prédiction de défaut</title>

```
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        text-align: center;
        padding: 40px;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 400px;
        margin: auto;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px 20px;
        background-color: #007BFF;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0056b3;
    }

    .result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        color: #333;
    }
</style>
```

</head>

<body>

<div class="container">
    <h2>Prédiction de défaut (Logistic Regression)</h2>

```
<form action="/predict" method="post">
    <input type="text" name="credit_lines_outstanding" placeholder="En-cours restant de ligne de crédit" required>
    <input type="text" name="loan_amt_outstanding" placeholder="Montant d'en-cours du prêt" required>
    <input type="text" name="total_debt_outstanding" placeholder="Montant total de la dette" required>
    <input type="text" name="income" placeholder="Revenus annuels" required>
    <input type="text" name="years_employed" placeholder="Ancienneté dans le poste (années)" required>
    <input type="text" name="fico_score" placeholder="Score FICO (de 300 à 800)" required>

    <button type="submit">Prédire</button>
</form>

{% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
{% endif %}
```

</div>

</body>
</html>
